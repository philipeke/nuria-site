<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Nuria</title>
  <meta name="description" content="Nuria page not found." />
  <meta name="theme-color" content="#050c08" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="/assets/favicon-48.png" />
  <link rel="icon" type="image/png" href="/assets/favicon-tab.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/js/referral-routing.js"></script>
  <script>
    (function () {
      var routing = window.NuriaReferralRouting || {};
      var buildJoinRedirectUrl = routing.buildJoinRedirectUrl;
      if (typeof buildJoinRedirectUrl !== "function") return;

      var nextUrl = buildJoinRedirectUrl(window.location);
      if (!nextUrl) return;

      var currentUrl = (window.location.pathname || "") + (window.location.search || "");
      if (nextUrl !== currentUrl) {
        window.location.replace(nextUrl);
      }
    }());
  </script>
</head>
<body>
  <div class="hero__geo-bg" aria-hidden="true"></div>
  <header class="page-hero">
    <div class="container">
      <p class="page-hero__label">Nuria</p>
      <h1 class="page-hero__title">Page not found</h1>
      <p class="page-hero__subtitle">
        The page you requested is not available. If you were trying to open a referral link, please check the URL or return to Nuria.
      </p>
      <div class="hero__actions" style="justify-content:center; margin-top: 2rem;">
        <a href="/" class="btn btn--gold">Go to homepage</a>
        <a href="/join" class="btn btn--outline">Referral page</a>
      </div>
    </div>
  </header>
  <script src="/js/i18n.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>

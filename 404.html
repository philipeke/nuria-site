  <script>
    (function () {
      var currentUrl = (window.location.pathname || "") + (window.location.search || "");

      // /dua/<category> (email deeplinks) has no static page per category —
      // send it to the dua landing page. Devices with the app installed never
      // reach this 404 (App Links / Universal Links open the app instead).
      if (/^\/duas?\//i.test(window.location.pathname || "")) {
        window.location.replace("/dua/");
        return;
      }

      var quranLink = window.NuriaQuranLink || {};
      if (typeof quranLink.buildQuranRedirectUrl === "function") {
        var quranUrl = quranLink.buildQuranRedirectUrl(window.location);
        if (quranUrl && quranUrl !== currentUrl) {
          window.location.replace(quranUrl);
          return;
        }
      }

      var inviteLink = window.NuriaInviteLink || {};
      if (typeof inviteLink.buildInviteRedirectUrl === "function") {
        var inviteUrl = inviteLink.buildInviteRedirectUrl(window.location);
        if (inviteUrl && inviteUrl !== currentUrl) {
          window.location.replace(inviteUrl);
          return;
        }
      }

      var routing = window.NuriaReferralRouting || {};
      var buildJoinRedirectUrl = routing.buildJoinRedirectUrl;
      if (typeof buildJoinRedirectUrl !== "function") return;

      var nextUrl = buildJoinRedirectUrl(window.location);
      if (!nextUrl) return;

      if (nextUrl !== currentUrl) {
        window.location.replace(nextUrl);
      }
    }());
  </script>
  <script src="/js/blog-redirects.js"></script>
  <script>
    // A /blog/<slug>/ URL that 404s is almost always a post published to the
    // CMS since the last static build. Fall back to the client renderer so the
    // link never dies; the daily build then emits its indexable static page.
    // Consolidated slugs resolve straight to their pillar.
    (function () {
      var m = window.location.pathname.match(/^\/blog\/([^/]+)\/?$/);
      if (m && m[1] !== 'index.html') {
        var slug = decodeURIComponent(m[1]);
        var R = window.NuriaBlogRedirects;
        var target = (R && R.resolve && R.resolve(slug)) || slug;
        window.location.replace('/blog/?post=' + encodeURIComponent(target) + '&inline=1');
      }
    }());
  </script>

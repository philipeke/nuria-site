<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n-title="pages.not_found_title">Page Not Found | Nuria</title>
  <meta name="description" data-i18n-content="pages.not_found_desc" content="The requested Nuria page is not available." />
  <meta name="theme-color" content="#050c08" />
  <meta property="og:title" content="Nuria" />
  <meta
    property="og:description"
    content="Open Nuria links, referral codes, and app pages from the official Nuria website."
  />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://nuria.oakdev.app/" />
  <meta property="og:site_name" content="Nuria" />
  <meta property="og:image" content="https://nuria.oakdev.app/assets/Nuria%20Logo.png" />
  <meta property="og:image:secure_url" content="https://nuria.oakdev.app/assets/Nuria%20Logo.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1600" />
  <meta property="og:image:height" content="1600" />
  <meta property="og:image:alt" content="Nuria logo" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Nuria" />
  <meta name="twitter:description" content="Open Nuria links, referral codes, and app pages from the official Nuria website." />
  <meta name="twitter:image" content="https://nuria.oakdev.app/assets/Nuria%20Logo.png" />
  <meta name="twitter:image:alt" content="Nuria logo" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="/assets/favicon-48.png" />
  <link rel="icon" type="image/png" href="/assets/favicon-tab.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="/js/referral-routing.js"></script>
  <script>
    (function () {
      var routing = window.NuriaReferralRouting || {};
      var buildJoinRedirectUrl = routing.buildJoinRedirectUrl;
      if (typeof buildJoinRedirectUrl !== "function") return;

      var nextUrl = buildJoinRedirectUrl(window.location);
      if (!nextUrl) return;

      var currentUrl = (window.location.pathname || "") + (window.location.search || "");
      if (nextUrl !== currentUrl) {
        window.location.replace(nextUrl);
      }
    }());
  </script>
  <script src="/js/i18n.js"></script>
</head>
<body>
  <div class="hero__geo-bg" aria-hidden="true"></div>
  <header class="page-hero">
    <div class="container">
      <p class="page-hero__label" data-i18n="pages.not_found_label">Nuria</p>
      <h1 class="page-hero__title" data-i18n="pages.not_found_heading">Page not found</h1>
      <p class="page-hero__subtitle" data-i18n="pages.not_found_sub">
        The page you requested is not available. If you were trying to open a referral link, please check the URL or return to Nuria.
      </p>
      <div class="hero__actions" style="justify-content:center; margin-top: 2rem;">
        <a href="/" class="btn btn--gold" data-i18n="pages.not_found_home">Go to homepage</a>
        <a href="/join" class="btn btn--outline">Referral page</a>
      </div>
    </div>
  </header>
  <script src="/js/site-config.js"></script>
  <script src="/js/site-utils.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>

name = "nuria-chat"
main = "src/index.js"
compatibility_date = "2025-11-01"
workers_dev = false

# --- Route the BFF at the apex under /api/chat -----------------------------
# Uncomment once ready to go live (nuria.one is already on this Cloudflare account).
routes = [
  { pattern = "nuria.one/api/chat", zone_name = "nuria.one" }
]

[vars]
NURIA_API_BASE = "https://api.nuria.one"

# --- Trial-period cost controls ---------------------------------------------
# Free-tier-friendly and deliberately conservative for "try it" launch. No
# Cloudflare paid plan is needed at this volume (Workers free tier: 100,000
# requests/day). LLM cost is pay-per-use — these two caps bound it directly.
# Raise both once real usage patterns are known.
NURIA_RATE_LIMIT_PER_MIN = "8"      # per visitor
NURIA_DAILY_REQUEST_CAP = "500"     # whole site, per UTC day — the real cost backstop
# NURIA_MOCK = "1"            # return mock answers (pre-launch / local preview)
# NURIA_ALLOW_LOCALHOST = "1" # allow localhost origins during local dev

# --- Per-IP + daily-cap counters (KV) ---------------------------------------
# Create the namespace, then paste its id here:
#   wrangler kv namespace create RATE_LIMIT
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "<your-kv-namespace-id>"

# --- Secret (NEVER in code/git) --------------------------------------------
#   wrangler secret put NURIA_API_KEY
#   Use the demo key for the trial period, NOT a partner key — it is already
#   separately revocable/rate-limited server-side. See ../../README.md.
